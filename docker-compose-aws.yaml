services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566" # Floci AWS emulator (same port as Moto/LocalStack for compatibility)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || curl -sf http://localhost:4566/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
